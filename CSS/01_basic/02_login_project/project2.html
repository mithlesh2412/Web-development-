<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Facebook</title>
    <style>
        body{
            background-color: rgb(141, 236, 236);
           margin:0px;
           padding:0px;
           height:100vh;
           display: flex;
            justify-content: center;
            align-items: center;

        }
         .FB {
            background-color: #fff3f3;
            border-radius: 10px;
            padding :10px;
            width :300px;

         }
         h2 {
            text-align: center;
            margin-bottom: 20px;
         }
         form {
            display: flex;
            flex-direction:column;

         }
         input {
            margin-bottom: 15px;
            padding:10px;
            border-radius: 5px;
            border: 2px solid black;
            background-color: rgb(226, 226, 237);
         }
         button {
            background-color: cornflowerblue;
            color:#fff3f3;
            padding: 10px;
            border-radius: 5px;
         }
         button:hover {
            background-color: #d17979;
         }
    </style>
</head>
<body>
    <div class ="FB">
        <h2>Login to Facebook</h2>
        <form>
            <input type ="text" id ="email" name ="email" placeholder="Enter email address"/>
           <input type ="pwd" id = "password" placeholder="Enter password">
           <button type ="submit" >LogIn </button>
           

        </form>
    </div>
    
</body>
</html>
