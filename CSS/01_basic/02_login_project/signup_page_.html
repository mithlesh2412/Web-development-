<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <style>
        body {
            background-color: rgba(35, 54, 221, 0.2);
            margin: 0px;
            display :flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;


        }
        .page {
            background-color: rgb(253, 248, 248);
           border-radius: 10px;
            padding :30px;
            width :310px;
        }
        h2 {
            background-color: rgb(91, 91, 141);
            text-align: center;
            margin-bottom: 40px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input {
            margin-bottom: 10px;
            padding :10px;
            border-radius: 5px;
            border :1px solid black
          
        }
        button {
            background-color: rgb(75, 217, 217);
            padding:10px;
            color :aliceblue;
            border-radius: 5px;


        }
        button:hover {
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class ="page">
        <h2>SIGNUP</h2>
        <form>
            <input type ="text"  id ="Firstname" placeholder="Enter Firstname">
            <input type ="text"  id ="Lastname" placeholder="Enter lastname">
            <input type ="email" id ="Email" placeholder="Enter Email">
            <input type ="password"  id ="Password" placeholder="Enter Pwd">
            <button type ="Submit">Signup</button>
        </form>
    </div>
    
</body>
</html>
