<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profile Card</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


        <style>
            body {
    background-color: #0f172a;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.profile-card {
    background-color: #1e293b;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.profile-image img {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 15px;
}

.social-links {
    margin-top: 20px;
}

.social-links a {
    display: inline-block;
    margin: 10px;
    font-size: 24px;
    color: white;
    transition: 0.3s;
}

.social-links a:hover {
    transform: scale(1.3);
}

/* Brand Colors on Hover */
.social-links a:nth-child(1):hover {
    color: #0077b5;   /* LinkedIn */
}

.social-links a:nth-child(2):hover {
    color: #333;      /* GitHub */
}

.social-links a:nth-child(3):hover {
    color: #ff0000;   /* YouTube */
}





        </style>
    </head>
    <body>
        <div class ="profile-card">
            <div class ="profile-image">
            <img src = "Profilepic.jpeg" alt="Profile Image">
            </div>
            <div class="profile-info">
                <h2>Mithlesh Paswan</h2>           
                <p>Web Developer</p>
                <p>Passionate about creating beautiful and functional websites.</p>

              <div class="social-links">
    <a href="https://www.linkedin.com/in/mithlesh-paswan-4aa79630a" target="_blank">
        <i class="fab fa-linkedin"></i>
    </a>

    <a href="https://github.com/mithlesh2412" target="_blank">
        <i class="fab fa-github"></i>
    </a>

    <a href="https://youtube.com/@afterhours2412?si=X0BmPCcz5UE52oQc" target="_blank">
        <i class="fab fa-youtube"></i>
    </a>
</div>





                 


            </div>
             

        </div>
 

    </body>

</html>
