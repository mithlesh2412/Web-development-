<html>
  <head>
    <title>A simple Profile Card</title>
    
  </head>
  <style>
  .profile-card{
    border:3px solid black;
    width:250px;
    padding:20px;
    text-align:center ;
    border-radius: 10px;
    background-color:white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  
  body{
    display:flex;
    justify-content: center;
    align-items: center;
    height:100vh;
    background-color: #f3f4f6;
  }
  .button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    background-color: blue;
    color:white;
    border-radius: 5px;
    cursor:pointer;
  }
  .button:hover{
    transition: 0.3s;;
  }
    
  </style>
  <body>
    <div class ="profile-card">
     <h1>Mithlesh Paswan</h1>
     <p>CSE student</p>
     <p>Learning Web development</p>
    <button class ="button">Follow</button>
    </div>
    
  </body>
</html>
