<html>
  <head>
    <title> A sample login form</title>
    
  </head>
  <style>
  body{
    display:flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f3f4f6;
    
    
  }
  .form{
    background-color: white;
    padding:30px;
    width:300px;
    border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2) ;
  text-align: center;
    
  }
  input{
    width:100%;
    padding: 10px;
    margin:10px 0;
    border-radius: 5px;
    border:1px solid gray;
  }
  
  button{
    width:100%;
    padding: 10px;
    border:none;
    background-color: blue;
    color:white;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
  }
    button:hover {
  background-color: darkblue;
}
  </style>
  <body>
    <div class ="form">
      
        <input type="text" placeholder="Enter your name">
<input type="password" placeholder="Enter your password">

      <button>LOGIN</button>
    </div>
  </body>
</html>
