<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Design</title>

<style>
    body{
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;  
        background-color: #1a1a1a;
    }

    .responsive-div{
        width: 300px; /* changed from 100px */
        max-width: 90%;
        padding:20px;
        color: white;
        font-size: 20px;
        background-color: #3498db;
        text-align: center;
    }

    @media (max-width: 600px){
        body{
            align-items: flex-start;
            padding-top: 40px;
        }

        .responsive-div{
            background-color: #19a0c5;
        }
    }
@media(min-width: 601px) and (max-width: 1024px){
      body{
            align-items: center;
            padding-top: 40px;
        }

        .responsive-div{
            background-color: #d55d0d;
        } 
}
</style>

</head>

<body>
    <div class="responsive-div">
        This div changes color based on the screen
    </div>
</body>
</html>
