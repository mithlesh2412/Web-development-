<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Example</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .content{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 85vh;
    }

    .card {
        border: none;
        border-radius: 20px;
    }
</style>
</head>

<body>

<!-- White Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">MyWebsite</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Centered Card -->
<div class="content">
  <div class="card shadow-lg" style="width: 18rem;">
    <img src="https://images.pexels.com/photos/34908249/pexels-photo-34908249.jpeg"
         class="card-img-top"
         alt="Nature Image">

    <div class="card-body">
      <h5 class="card-title">Beautiful Nature</h5>
      <p class="card-text">
        This is a Bootstrap card example with image and content.
      </p>
      <a href="#" class="btn btn-primary">Explore</a>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
